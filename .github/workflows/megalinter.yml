name: MegaLinter (PR Checks)

on:
  pull_request:
    branches: [ "main", "master" ]

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  megalinter:
    name: Run MegaLinter
    runs-on: ubuntu-latest
    permissions:
      security-events: write 
      pull-requests: write   
      statuses: write        
      contents: read         
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Run MegaLinter (Java Flavor)
        uses: oxsecurity/megalinter/flavors/java@v8
        env:
          # Crucial: Set to false so it ONLY validates modified files in this PR
          VALIDATE_ALL_CODEBASE: false 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
