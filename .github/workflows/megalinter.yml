name: MegaLinter (PR Checks)

# Trigger exclusively on pull requests targeting your default branch
on:
  pull_request:
    branches: [ "main", "master" ]

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  megalinter:
    name: Run MegaLinter
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Writes security issues to GitHub security tab
      pull-requests: write   # Allows MegaLinter to write summary comments on the PR
      statuses: write        # Allows MegaLinter to set pass/fail status checks
      contents: read         # Allows reading your codebase
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Pulls the full git history so MegaLinter can compare branches and find changed files
          fetch-depth: 0 

      - name: Run MegaLinter (Java Flavor)
        uses: oxsecurity/megalinter/flavors/java@v8
        env:
          # Set to false so it ONLY validates modified files in this PR (fast and targeted)
          VALIDATE_ALL_CODEBASE: false 
          # Enables automatic commit annotations and PR comments
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
