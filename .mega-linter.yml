# MegaLinter Configuration File
APPLY_FIXES: "none"

# 1. CRUCIAL: Stops MegaLinter from scanning giant generated compiler/dependency folders
EXCLUDED_DIRECTORIES:
  - "target"
  - "build"
  - ".gradle"
  - ".m2"
  - "node_modules"

# 2. Run only the logical/vulnerability scanning tools (No style checks)
ENABLE_LINTERS:
  - JAVA_PMD
  - REPO_SEMGREP
  - SECRET_GITLEAKS
